version: '3.8'

services:

  perso-jenkins-agent-python:
    image: jenkins-agent-python:latest
    container_name: perso-jenkins-agent-python
    restart: unless-stopped
    depends_on:
      - jenkins
    
    environment:
      - JENKINS_URL=http://jenkins:8080
      - JENKINS_AGENT_NAME=perso-docker-agent-python
      - JENKINS_AGENT_SECRET=ceab0a63e09babf5bf838a90fc8652044c8e9dad923817d4e9dfcce4253eebaf
      - JENKINS_AGENT_WORKDIR=/home/jenkins
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

  jenkins:
    image: jenkins/jenkins:lts
    container_name: jenkins
    ports:
      - '8080:8080'
      - '50000:50000'
    volumes:
      - C:/docker/jenkins:/var/jenkins_home
    restart: unless-stopped
    user: root
    environment:
      - JAVA_OPTS=-Djenkins.install.runSetupWizard=false
